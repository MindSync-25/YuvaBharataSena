<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Page Not Found — Yuva Bharata Sena</title>
  <link rel="stylesheet" href="global.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Noto+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    .not-found {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column;
      text-align: center;
      padding: 3rem 2rem;
      background: linear-gradient(160deg, var(--navy-dark) 0%, var(--navy) 100%);
    }
    .not-found-num {
      font-family: var(--font-display);
      font-size: 10rem;
      font-weight: 700;
      color: transparent;
      background: linear-gradient(135deg, var(--saffron), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
      margin-bottom: 1rem;
    }
    .not-found h2 {
      font-family: var(--font-display);
      font-size: 2rem;
      color: var(--white);
      margin-bottom: 1rem;
    }
    .not-found p {
      color: rgba(255,255,255,.60);
      max-width: 400px;
      margin: 0 auto 2rem;
      font-size: 1rem;
      line-height: 1.65;
    }
    .not-found-links { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
  </style>
</head>
<body>
  <div class="not-found">
    <div class="not-found-num">404</div>
    <h2>Page not found.</h2>
    <p>The page you're looking for doesn't exist or may have moved. Head back home and continue with the movement.</p>
    <div class="not-found-links">
      <a href="index.html" class="btn-primary">Back to Home</a>
      <a href="join.html" class="btn-outline">Join YBS</a>
    </div>
  </div>
</body>
</html>
